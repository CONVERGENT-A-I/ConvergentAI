name: Deploy CONVERGENT-AI to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Docker app to GCP VM
        run: |
          gcloud compute ssh convergent-ai \
            --zone us-east1-b \
            --project ailana-488814 \
            --tunnel-through-iap \
            --quiet \
            --command "
              set -e

              sudo bash -lc '
                cd /opt/convergent-ai/ConvergentAI

                git config --global --add safe.directory /opt/convergent-ai/ConvergentAI

                echo Pull latest code
                git fetch origin main
                git reset --hard origin/main

               echo Rebuild and recreate containers
               docker-compose up -d --build --force-recreate --remove-orphans

               echo Verify containers
               docker ps | grep convergent

               echo Clean unused images
               docker image prune -f
              '
            "
