name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Docker app to GCP VM
        run: |
          gcloud compute ssh convergent-ai \
            --zone us-east1-b \
            --project ailana-488814 \
            --tunnel-through-iap \
            --quiet \
            --command "
              set -e

              sudo bash -lc '
                cd /opt/convergent-ai/ConvergentAI

                git config --global --add safe.directory /opt/convergent-ai/ConvergentAI

                echo Pull latest code
                git fetch origin main
                git reset --hard origin/main

                echo Build Docker image
                docker build -t convergentai:latest .

                #echo Remove old container
                docker rm -f convergentai.tech || true

                #echo Start new container
                docker run -d \
                  --name convergentai.tech \
                  --restart unless-stopped \
                  -p 3000:3000 \
                  convergentai:latest

                #echo Verify container
                docker ps | grep convergentai.tech

                #echo Delete old unused images
                #docker image prune -f
              '
            "
