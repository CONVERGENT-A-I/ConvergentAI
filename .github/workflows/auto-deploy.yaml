name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM
        run: |
          gcloud compute ssh convergent-ai \
            --zone us-east1-b \
            --project ailana-488814 \
            --quiet \
            --command "
              set -e
              sudo ls -la /opt/convergent-ai
              sudo git config --global --add safe.directory /opt/convergent-ai/ConvergentAI
              sudo cd /opt/convergent-ai/ConvergentAI
              sudo git fetch origin main
              sudo git reset --hard origin/main
              sudo docker ps

            "
